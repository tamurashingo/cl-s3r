name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.sample }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample: [01-counter, 02-todo, 03-books, 04-login, 08-data-table]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: sample/${{ matrix.sample }}
        run: make image

      - name: Run unit tests
        working-directory: sample/${{ matrix.sample }}
        run: make test

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        working-directory: e2e
        run: make image

      - name: Run E2E tests
        working-directory: e2e
        run: make test
