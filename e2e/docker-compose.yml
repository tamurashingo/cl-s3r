services:
  counter:
    image: cl-s3r-sample-01-counter:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 01-counter
    environment:
      PORT: "5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  todo:
    image: cl-s3r-sample-02-todo:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 02-todo
    environment:
      PORT: "5002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  books:
    image: cl-s3r-sample-03-books:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 03-books
    environment:
      PORT: "5003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  login:
    image: cl-s3r-sample-04-login:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 04-login
    environment:
      PORT: "5004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  error-handling:
    image: cl-s3r-sample-06-error-handling:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 06-error-handling
    environment:
      PORT: "5006"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  data-table:
    image: cl-s3r-sample-08-data-table:latest
    build:
      context: ../
      dockerfile: Dockerfile.sample
      args:
        SAMPLE_NAME: 08-data-table
    environment:
      PORT: "5008"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5008/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s

  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      counter:
        condition: service_healthy
      todo:
        condition: service_healthy
      books:
        condition: service_healthy
      login:
        condition: service_healthy
      error-handling:
        condition: service_healthy
      data-table:
        condition: service_healthy
    environment:
      COUNTER_URL: "http://counter:5001"
      TODO_URL: "http://todo:5002"
      BOOKS_URL: "http://books:5003"
      LOGIN_URL: "http://login:5004"
      ERROR_HANDLING_URL: "http://error-handling:5006"
      DATA_TABLE_URL: "http://data-table:5008"
